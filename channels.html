<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verification</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
background:#050505;
color:#fff;
padding:18px;
padding-bottom:120px;
overflow-y:auto;
scroll-behavior:smooth;
}

/* BACKGROUND */
.bg{
position:fixed;
width:200%;
height:200%;
background:
radial-gradient(circle at 20% 30%, #22c55e20, transparent 40%),
radial-gradient(circle at 80% 70%, #facc1520, transparent 40%);
animation:move 18s linear infinite;
z-index:-1;
}
@keyframes move{
50%{transform:translate(-10%,-10%);}
}

/* HEADER */
.title{font-size:22px;font-weight:700;}
.sub{font-size:13px;opacity:0.5;margin-top:4px;}

/* PROGRESS */
.progressWrap{margin:18px 0;}
.progressText{font-size:12px;opacity:0.6;margin-bottom:6px;}

.progress{
height:6px;
background:#111;
border-radius:10px;
overflow:hidden;
}
.progress div{
height:100%;
width:0%;
background:linear-gradient(90deg,#22c55e,#facc15,#22c55e);
background-size:200%;
animation:flow 3s linear infinite;
transition:0.4s;
}
@keyframes flow{
to{background-position:200%;}
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

/* CARD */
.card{
padding:14px;
border-radius:16px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.08);
cursor:pointer;
transition:0.25s;
display:flex;
flex-direction:column;
justify-content:space-between;
min-height:110px;
position:relative;
overflow:hidden;
}

.card:hover{
transform:translateY(-4px) scale(1.02);
}

.card.joined{
border-color:#22c55e;
box-shadow:0 0 25px #22c55e55;
}

/* TEXT */
.name{font-size:14px;font-weight:600;}
.status{font-size:11px;opacity:0.5;margin-top:4px;}

.btn{
margin-top:10px;
padding:6px;
border-radius:10px;
background:#222;
text-align:center;
font-size:12px;
}

.card.joined .btn{
background:#22c55e;
color:#000;
}

/* RIPPLE */
.ripple{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.4);
transform:scale(0);
animation:ripple 0.6s linear;
}
@keyframes ripple{
to{transform:scale(6);opacity:0;}
}

/* BUTTON */
.continue{
margin-top:18px;
width:100%;
padding:14px;
border:none;
border-radius:30px;
background:#222;
color:#777;
transition:0.3s;
}

.continue.active{
background:linear-gradient(135deg,#22c55e,#16a34a);
color:#fff;
box-shadow:0 0 20px #22c55e88;
}

/* BOTTOM SHEET */
.modal{
display:none;
position:fixed;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.5);
justify-content:flex-end;
}

.box{
background:#0f0f0f;
padding:20px;
border-radius:20px 20px 0 0;
text-align:center;
width:100%;
border-top:1px solid rgba(255,255,255,0.1);
animation:slideUp 0.4s ease;
}

@keyframes slideUp{
from{transform:translateY(100%);}
to{transform:translateY(0);}
}

input{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin:12px 0;
background:#222;
color:#fff;
}

.submit{
width:100%;
padding:12px;
border:none;
border-radius:25px;
background:#22c55e;
color:#000;
}

.success{
font-size:18px;
color:#22c55e;
margin-bottom:8px;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="title">Verification</div>
<div class="sub">Complete all steps</div>

<div class="progressWrap">
<div class="progressText" id="txt">0 / 9</div>
<div class="progress"><div id="bar"></div></div>
</div>

<div class="grid" id="grid"></div>

<button class="continue" id="btn">Continue</button>

<div class="modal" id="modal">
<div class="box" id="box">
<h3>Enter UID to Continue</h3>
<input placeholder="Enter UID">
<button class="submit" onclick="verify()">Submit</button>
</div>
</div>

<script>

let links=[
"https://t.me/+oU-QbbREjx81NzE1",
"https://t.me/+PKqs7oM1XA05M2Vl",
"https://t.me/+r72-luRvSXUyOTA9",
"https://t.me/+0kOI-4T16pRkNDM1",
"https://t.me/+OTUi0sTq9iE1N2Q9",
"https://t.me/+IyBMvFx76CVlY2I1",
"https://t.me/+4nIg5ue0RNxiOWQ1",
"https://t.me/+AzW2HTDVWVtlMGI1",
"https://t.me/addlist/arDUJy-LVjM5ZjJ"
];

let joined=JSON.parse(localStorage.getItem("lux9"))||[];
let grid=document.getElementById("grid");

links.forEach((link,i)=>{
let div=document.createElement("div");
div.className="card";

if(joined.includes(i)) div.classList.add("joined");

div.innerHTML=`
<div>
<div class="name">${i==8?"Final Step":"Channel "+(i+1)}</div>
<div class="status">${joined.includes(i)?"Joined":"Tap to join"}</div>
</div>
<div class="btn">${joined.includes(i)?"✔":"Join"}</div>
`;

div.onclick=(e)=>{
let r=document.createElement("span");
r.className="ripple";
r.style.left=e.offsetX+"px";
r.style.top=e.offsetY+"px";
div.appendChild(r);
setTimeout(()=>r.remove(),600);

window.open(link);

if(!joined.includes(i)){
joined.push(i);
localStorage.setItem("lux9",JSON.stringify(joined));
div.classList.add("joined");
div.querySelector(".status").innerText="Joined";
div.querySelector(".btn").innerText="✔";
update();
}
};

grid.appendChild(div);
});

function update(){
document.getElementById("txt").innerText=joined.length+" / 9";
document.getElementById("bar").style.width=(joined.length/9)*100+"%";

if(joined.length>=7){
document.getElementById("btn").classList.add("active");
}
}

update();

document.getElementById("btn").onclick=function(){
if(joined.length>=7){
document.getElementById("modal").style.display="flex";
}
}

function verify(){
document.getElementById("box").innerHTML=`
<div class="success">✔ Verified</div>
<p style="opacity:0.6;font-size:13px;">Processing your request...</p>
`;
}

</script>

</body>
</html>
